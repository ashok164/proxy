services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxy-server
    init: true
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - API_URL=${API_URL}
      - CLIENT_ID=${CLIENT_ID}
      - SHEET_URL=${SHEET_URL}
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    networks:
      - proxy-network

networks:
  proxy-network:
    driver: bridge

volumes:
  uploads:
